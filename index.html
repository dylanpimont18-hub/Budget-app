<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comptes Communs</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Comptes">
</head>
<body>
    <div id="app">
        <section id="view-home" class="view active">
            <header>
                <h2>Budget Mensuel</h2>
            </header>
            <main class="center-content">
                <p class="subtitle">Total estimé</p>
                <div class="giant-total" id="home-total">0 €</div>
            </main>
            <footer class="action-buttons">
                <button id="btn-start" class="btn-primary">Faire les comptes</button>
                <button id="btn-go-recap" class="btn-secondary">Voir le récap</button>
            </footer>
        </section>

        <section id="view-swipe" class="view">
            <header class="header-with-back">
                <button id="btn-cancel-swipe" class="btn-text">✕ Annuler</button>
                <div class="progress" id="progress-text">1 / 5</div>
            </header>
            
            <main class="card-area">
                <div id="card-container" class="card">
                    <div class="card-content">
                        <div id="card-icon" class="emoji">🏠</div>
                        <h2 id="card-name">Loyer</h2>
                        <div id="card-amount" class="amount">850 €</div>
                    </div>
                    <button id="btn-edit" class="btn-outline">Modifier le montant</button>
                </div>

                <div id="empty-card" class="card" style="display: none;">
                    <div class="card-content">
                        <div class="emoji">📭</div>
                        <h2>Aucune dépense</h2>
                    </div>
                    <button id="btn-add-swipe" class="btn-outline">+ Ajouter une dépense</button>
                </div>
            </main>

            <div class="swipe-guides">
                <span class="guide-red">← 🗑️ Supprimer</span>
                <span class="guide-green">Valider ✅ →</span>
            </div>

            <footer>
                <button id="btn-undo" class="btn-text" disabled>↩ Annuler le dernier swipe</button>
                <button id="btn-skip-swipe" class="btn-secondary" type="button">Voir le récap</button>
            </footer>
        </section>

        <section id="view-recap" class="view">
            <header class="header-with-back">
                <button id="btn-back-home" class="btn-text">← Accueil</button>
                <h2>Récapitulatif</h2>
            </header>
            
            <main class="summary-area">
                <div class="recap-header">
                    <div id="recap-count" class="recap-stat">0 dépenses</div>
                    <div id="recap-total" class="recap-stat highlight">0 €</div>
                </div>
                <ul id="summary-list" class="expense-list"></ul>
                <div class="recap-actions">
                    <button id="btn-add-expense" class="btn-outline">+ Nouvelle dépense</button>
                    <button id="btn-reset-data" class="btn-text">Réinitialiser les données</button>
                </div>
            </main>
        </section>
    </div>

    <div id="expense-modal" class="modal" aria-hidden="true">
        <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <button id="btn-close-modal" class="btn-text modal-close" aria-label="Fermer le formulaire">✕</button>
            <h2 id="modal-title">Nouvelle dépense</h2>
            <form id="expense-form">
                <label for="expense-name">Nom de la dépense</label>
                <input id="expense-name" name="name" type="text" required autocomplete="off">
                <label for="expense-amount">Montant (€)</label>
                <input id="expense-amount" name="amount" type="number" min="0" step="0.01" required>
                <div class="modal-actions">
                    <button type="button" id="btn-cancel-form" class="btn-text">Annuler</button>
                    <button type="submit" class="btn-primary">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
